services:
  app:
    build:
      context: .
      dockerfile: docker/prod/php/Dockerfile
    container_name: rejecthandler_prod
    ports:
      - "8080:8000"
    env_file:
      - .env.prod
    depends_on:
      - db
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - rejecthandler_prod_network

  db:
    image: postgres:15
    container_name: rejecthandler_db_prod
    env_file:
      - .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - rejecthandler_prod_network

networks:
  rejecthandler_prod_network:
    driver: bridge

volumes:
  pgdata_prod:
