services:
  app:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
    container_name: rejecthandler_dev
    volumes:
      - ./src:/var/www/html
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - rejecthandler_dev_network

  db:
    image: postgres:15
    container_name: rejecthandler_db_dev
    env_file:
      - .env.dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rejecthandler_dev_network

networks:
  rejecthandler_dev_network:
    driver: bridge

volumes:
  pgdata_dev:
